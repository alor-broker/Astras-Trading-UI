name: Tests

on:
  # Direct pushes only on the main branch; every other branch is covered by its pull request.
  # This avoids running twice (push + pull_request) for branches that have an open PR.
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A newer commit on the same ref cancels the previous, still-running tests.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # The job (and its summary) is named after the project, so each Vitest report is
    # clearly attributed instead of being stacked anonymously in a single summary.
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      # Run every project even if one fails, so a single red project does not hide the rest.
      fail-fast: false
      matrix:
        node-version: [24.x]
        project:
          - desktop-terminal
          - mobile-terminal
          - admin-terminal
          - terminal-core-lib
          - terminal-widgets-lib

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Report header
        run: |
          {
            echo "## 🧪 ${{ matrix.project }}"
            echo ""
            echo "Node ${{ matrix.node-version }} · commit \`${GITHUB_SHA::7}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test ${{ matrix.project }}
        run: >-
          pnpm exec ng test ${{ matrix.project }} --no-watch
          --coverage
          --coverage-reporters=text-summary
          --coverage-reporters=json-summary

      - name: Coverage summary
        if: always()
        run: |
          FILE="coverage/${{ matrix.project }}/coverage-summary.json"
          if [ ! -f "$FILE" ]; then
            echo "_No coverage report produced for ${{ matrix.project }}._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          COVERAGE_FILE="$FILE" COVERAGE_PROJECT="${{ matrix.project }}" node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const total = JSON.parse(fs.readFileSync(process.env.COVERAGE_FILE, 'utf8')).total;
          const row = (key) => {
            const m = total[key];
            const name = key[0].toUpperCase() + key.slice(1);
            return `| ${name} | ${m.pct}% | ${m.covered}/${m.total} |`;
          };
          const lines = [
            `### 📊 Coverage — ${process.env.COVERAGE_PROJECT}`,
            '',
            '| Metric | % | Covered / Total |',
            '|---|--:|--:|',
            ...['statements', 'branches', 'functions', 'lines'].map(row),
            '',
          ];
          process.stdout.write(lines.join('\n') + '\n');
          NODE

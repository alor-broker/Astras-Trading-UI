<ng-container *transloco="let t; scope: 'invest-ideas'">
  <div *ngrxLet="ideas$ as ideas; suspenseTpl: loading">
    @if (ideas.length > 0) {
      <nz-carousel [nzDots]="true">
        @for (idea of ideas; track idea) {
          <div class="p-5" nz-carousel-content>
            <div (click)="openIdea(idea)" class="idea">
              <div class="mb-10">
                <span class="fs-6 heading-color" nz-typography nzEllipsis>{{ idea.title }}</span>
              </div>
              <div>
                <p [nzEllipsisRows]="3" nz-typography nzEllipsis>{{ idea.body }}</p>
              </div>
              <div class="d-flex flex-row flex-nowrap justify-content-start flex-gap-10">
                @for (instrument of idea.instruments; track instrument) {
                  @if ($index < 4) {
                    @if (instrument | async; as instrumentInfo) {
                      <div class="d-flex flex-column align-items-center flex-gap-5 symbol">
                        <ats-instrument-icon [symbol]="instrumentInfo.symbol" shape="rounded-square"
                                             size="large"/>
                        <span class="heading-color" nz-typography nzEllipsis>{{ instrumentInfo.shortName }}</span>
                      </div>
                    }
                  }
                }
              </div>
            </div>
          </div>
        }
      </nz-carousel>
    } @else {
      <nz-empty [nzNotFoundContent]="t('investIdeas.noItemsToDisplayMessage')" nzNotFoundImage="simple"/>
    }
  </div>

  <ng-template #loading>
    <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: 5, width: '100%' }"/>
  </ng-template>

  <ats-idea-details [(displayIdea)]="selectedIdea"/>
</ng-container>

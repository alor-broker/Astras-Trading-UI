@if (settings$ | async; as settings) {
  <ats-widget-skeleton
    [content]="contentRef"
    [header]="headerRef"
    [isBlockWidget]="isBlockWidget()"
    [settings]="settingsRef"
    [showContentScroll]="false"
    [showSettings]="showSettings()"
  >
    <ng-template #headerRef>
      <ats-widget-header (switchSettings)="toggleSettings()"
                         [guid]="guid"
                         [hasSettings]="true"
                         [widgetMeta]="widgetInstance().widgetMeta"
      />
    </ng-template>
    <ng-template #contentRef>
      <ats-admin-client-positions [guid]="guid"/>
    </ng-template>
    <ng-template #settingsRef>
      <ats-admin-client-positions-settings (settingsChange)="toggleSettings()" [guid]='guid'/>
    </ng-template>
  </ats-widget-skeleton>
}

<ng-container *transloco="let t; scope: 'portfolio-charts/portfolio-dynamics'">
  <ng-container *ngrxLet="{
  selectedTimeRange: selectedTimeRange$,
  chartConfig: chartConfig$,
  } as vm; suspenseTpl: loading">

    <div class="d-flex flex-column h-100">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <span class="heading-color fs-5">#{{ vm.chartConfig?.agreement }}</span>
        </div>

        <div class="fs-4">
          @if (vm.chartConfig?.rawData != null) {
            <span
              [class]="{
          'positive-color': vm.chartConfig!.rawData!.profitablityPct >= 0,
          'negative-color': vm.chartConfig!.rawData!.profitablityPct < 0
          }"
            >{{ (vm.chartConfig!.rawData!.profitablityPct / 100) | percent: '1.1-2' }}</span>
          }
        </div>
      </div>

      <div
        (nzResizeObserve)="containerSizeChanged($event)"
        class="flex-fill overflow-hidden"
        nzResizeObserver
      >
        <nz-spin [nzSpinning]="isLoading">
          <div class="d-flex align-items-center justify-content-center h-100">
            @if (vm.chartConfig != null) {
              <canvas
                [data]="vm.chartConfig.chartData"
                [options]="vm.chartConfig.charOptions"
                baseChart
                type="line"
              >
              </canvas>
            } @else {
              <nz-empty nzNotFoundImage="simple"/>
            }
          </div>
        </nz-spin>
      </div>

      <div class="mt-8 d-flex flex-row justify-content-center flex-gap-10">
        @for (item of availableTimeRanges; track $index) {
          <button
            (click)="selectedTimeRange$.next(item)"
            [disabled]="item === vm.selectedTimeRange"
            nz-button
            nzType="default"
          >
            {{ t('portfolioChartsPortfolioDynamics.timeRangeOptions.' + item, {fallback: item}) }}
          </button>
        }
      </div>
    </div>

  </ng-container>

  <ng-template #loading>
    <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: 5, width: '100%' }"/>
  </ng-template>
</ng-container>

<canvas #utilsCanvas class="d-none"></canvas>

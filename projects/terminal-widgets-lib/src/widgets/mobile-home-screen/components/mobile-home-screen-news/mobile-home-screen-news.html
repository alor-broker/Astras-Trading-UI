<ng-container *transloco="let t; scope: 'mobile-home-screen/news'">
  <div
    *ngrxLet="items$ as items; suspenseTpl: loading"
    class="d-flex flex-column"
  >
    @for (item of items; track item.id) {
      <div class="item">
        <span>{{ formatDate(item.publishDate) }}</span>
        <span class="heading-color">{{ item.header }}</span>
      </div>
    } @empty {
      <nz-empty [nzNotFoundContent]="t('mobileHomeScreenNews.noItemsToDisplayMessage')"
                nzNotFoundImage="simple"/>
    }
  </div>
  <button
    (click)="showMore.emit()"
    class="mt-5"
    nz-button
    nzBlock
  >
    {{ t('mobileHomeScreenNews.moreItemsButton.title') }}
  </button>
</ng-container>

<ng-template #loading>
  <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: displayRecordsCount, width: '100%' }"/>
</ng-template>

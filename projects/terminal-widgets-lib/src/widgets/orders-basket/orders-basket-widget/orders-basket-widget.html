<ng-container *transloco="let t;">
  @let settings = settings$ | async;
  <ats-widget-skeleton
    [content]="contentRef"
    [header]="headerRef"
    [isBlockWidget]="isBlockWidget()"
    [settings]="settingsRef"
    [showContentScroll]="true"
    [showSettings]="showSettings()"
  >
    <ng-template #headerRef>
      <ats-widget-header (switchSettings)="toggleSettings()"
                         [customTitle]="title$ | async"
                         [guid]="guid"
                         [hasSettings]="settings != null"
                         [showBadgesMenu]="false"
                         [widgetMeta]="widgetInstance().widgetMeta"
      />
    </ng-template>
    <ng-template #contentRef>
      <ats-orders-basket [guid]="guid"/>
    </ng-template>
    <ng-template #settingsRef>
      <ats-orders-basket-settings (settingsChange)="toggleSettings()" [guid]="guid"/>
    </ng-template>
  </ats-widget-skeleton>

</ng-container>

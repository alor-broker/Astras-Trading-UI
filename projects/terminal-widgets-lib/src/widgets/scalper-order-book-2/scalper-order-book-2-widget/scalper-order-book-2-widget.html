<ng-container *transloco="let t;">
  @if (settings$ | async; as settings) {
    <ats-widget-skeleton
      [content]="contentRef"
      [header]="headerRef"
      [isBlockWidget]="isBlockWidget()"
      [settings]="settingsRef"
      [showContentScroll]="false"
      [showSettings]="showSettings()"
    >
      <ng-template #headerRef>
        <ats-widget-header (switchSettings)="toggleSettings()"
                           [guid]="guid"
                           [hasSettings]="true"
                           [linkToActive]="settings.linkToActive ?? null"
                           [selectedBadgeColor]="settings.badgeColor"
                           [showBadgesMenu]="(showBadge$ | async) ?? false"
                           [titleTemplate]="titleTemplate"
                           [widgetMeta]="widgetInstance().widgetMeta"
        />
        <ng-template #titleTemplate>
          <ats-widget-header-instrument-switch [widgetGuid]="guid"/>
        </ng-template>
      </ng-template>
      <ng-template #contentRef>
        <ats-scalper-order-book-2 [guid]="guid" [isActive]="isActive()"/>
      </ng-template>
      <ng-template #settingsRef>
        <ats-scalper-order-book-settings (settingsChange)="toggleSettings()" [guid]="guid"/>
      </ng-template>
    </ats-widget-skeleton>
  }
</ng-container>

<ng-container *transloco="let t">
  <form [formGroup]="newKeywordForm" class="mb-20" nz-form>
    <nz-form-control
      [nzErrorTip]="t('validationErrors.stringInputLength', {min: validationOptions().minLength, max: validationOptions().maxLength} )">
      <nz-space-compact [style.width.%]="100">
        <input
          (keydown.enter)="addKeyword()"
          [placeholder]="newKeywordPlaceholder()"
          formControlName="newKeyword"
          nz-input
          type="text"
        />
        <button (click)="addKeyword()" [disabled]="newKeywordForm.invalid" nz-button nzType="primary">
          <nz-icon nzTheme="outline" nzType="plus"/>
        </button>
      </nz-space-compact>
    </nz-form-control>
  </form>

  <div class="tags-container">
    @for (keyword of displayKeywords; track keyword) {
      <nz-tag (nzOnClose)="removeKeyword(keyword)" [nzColor]="tagColor()" nzMode="closeable">{{ keyword }}</nz-tag>
    }
  </div>
</ng-container>

@if (settings$ | async; as settings) {
  <ats-widget-skeleton
    [content]="content"
    [header]="header"
    [isBlockWidget]="isBlockWidget()"
    [showContentScroll]="true"
  >
    <ng-template #header>
      <ats-widget-header
        [guid]="guid"
        [hasSettings]="false"
        [showBadgesMenu]="false"
        [widgetMeta]="widgetInstance().widgetMeta"
      />
    </ng-template>
    <ng-template #content>
      <ats-arbitrage-robot-table />
    </ng-template>
  </ats-widget-skeleton>
}

<ats-arbitrage-robot-modal-widget />

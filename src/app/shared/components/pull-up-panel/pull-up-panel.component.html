<div class="panel-header" #headerContainer
     (click)="onHeaderClick()"
     (mousedown)="onHeaderPointerDown($event)"
     (touchstart)="onHeaderPointerDown($event)">
  <ng-container *ngTemplateOutlet="header()" />
</div>

<div class="panel-body">
  <ng-container *ngTemplateOutlet="body()" />
</div>
